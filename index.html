    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 1rem 1.2rem;
            color: #222;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.8rem;
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 0.65rem 0.9rem;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e0e0e8;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            margin-bottom: 0.7rem;
        }

        .tg {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: #555;
            white-space: nowrap;
            font-weight: 500;
            min-width: 45px;
        }

        .sep {
            width: 1px;
            height: 20px;
            background: #e0e0e8;
            flex-shrink: 0;
        }

        .btn {
            font-size: 12px;
            padding: 5px 11px;
            border-radius: 7px;
            border: 1px solid #d0d0dc;
            background: #fff;
            color: #333;
            cursor: pointer;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .btn:hover {
            background: #f4f4f8;
            border-color: #aaa;
        }

        .btn-blue {
            background: #3b5bdb;
            border-color: #3b5bdb;
            color: #fff;
        }

        .btn-blue:hover {
            background: #2f4ac5;
        }

        .btn-red {
            border-color: #e06060;
            color: #c0392b;
        }

        .btn-red:hover {

            height: 15px;

        }

        select {

        .badge {

            color: #3b5bdb;
            font-weight: 600;

        #picker-row {

        .lt-wrap {

        .lt-wrap:hover {

            background: #e8eeff;
            box-shadow: 0 4px 12px rgba(59, 91, 219, 0.3);

        .lt {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: 2px solid #d0d5e8;
            overflow: hidden;
            background: #f5f6fb;

                border-color 0.15s ease,
                transform 0.15s ease,
                background 0.15s ease,
                box-shadow 0.15s ease;
        }

        .lt svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lt-num {
            font-size: 10px;
            color: #888;

            line-height: 1;

        }

            color: #3b5bdb;

        /* SWAP BAR */
        #swap-bar {

            align-items: center;
            gap: 8px;
            background: #fff8e1;
            border: 1px solid #f0c030;

        }

        #swap-bar.show {
            display: flex;
        }

        #cancel-swap {
            margin-left: auto;

            border: 1px solid #d0a010;

            cursor: pointer;
        }

        #cancel-swap:hover {
            background: #fff0c0;
        }

        /* CANVAS */

            border: 1px solid #dde;

        .cell {

            height: 18px;

        }

        }

        .hint {
            margin-top: 0.5rem;
            font-size: 11px;
            color: #bbb;
        }

        #upload-hidden {

        }

        /* ── ZOOM MODAL ── */
        #zoom-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        #zoom-modal.show {
            display: flex;
        }

        #zoom-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);

        }

        #zoom-box {
            position: relative;
            background: #fff;
            border-radius: 16px;

            font-size: 13px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
        }

        #zoom-preview-wrap {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e8;
            background: #222;
            cursor: grab;
            touch-action: none;
            user-select: none;
            position: relative;
        }

        #zoom-preview-wrap:active {
            cursor: grabbing;
        }

        #zoom-preview {
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #zoom-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform-origin: center center;
            pointer-events: none;
            will-change: transform;
        }

        #zoom-hint {
            font-size: 10.5px;
            color: #999;
            text-align: center;
        }

        .zoom-ctrl-row {
            display: flex;
            align-items: center;
            gap: 8px;

            font-size: 12px;
            color: #555;

            flex: 1;

        }

        #zoom-val-lbl {
            font-size: 12px;
            font-weight: 700;

        #zoom-reset {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #d0d0dc;
            background: #f4f4f8;

            white-space: nowrap;
        }

            background: #eaeaf0;
        }

        #zoom-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        #zoom-cancel-btn {
            font-size: 12px;
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid #d0d0dc;
            background: #fff;
            cursor: pointer;
        }

        #zoom-cancel-btn:hover {
            background: #f4f4f8;
        }

        #zoom-apply-btn {
            font-size: 12px;
            padding: 6px 18px;
            border-radius: 8px;
            border: none;
            background: #3b5bdb;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        #zoom-apply-btn:hover {
            background: #2f4ac5;
        }

        /* ══ MOBILE OPTIMIZATION ══════════════════════════════════ */
        @media (max-width: 600px) {

            body {
                padding: 0.6rem 0.6rem 5rem;
                /* bottom padding for thumb area */
                background: #f0f2f5;
            }

            h1 {
                font-size: 1.05rem;
                margin-bottom: 0.5rem;
            }

            /* Toolbar: wrap nicely, bigger touch targets */
            .toolbar {
                gap: 6px;
                padding: 0.5rem 0.65rem;
                border-radius: 10px;
                margin-bottom: 0.5rem;
            }

            .btn {
                font-size: 13px;
                padding: 7px 13px;
                border-radius: 8px;
                min-height: 36px;
            }

            select {
                font-size: 13px;

                min-height: 36px;
                border-radius: 8px;
            }

            label {
                font-size: 12px;
            }

            .val {
                font-size: 12px;
            }

            .badge {
                font-size: 12px;
                padding: 3px 10px;
            }

            input[type=range] {
                height: 20px;
            }

            /* Picker row */
            #picker-row {
                padding: 0.5rem 0.65rem;

            .lt {
                width: 42px;

            /* Canvas */
            #canvas-wrap {

            /* Zoom badge bigger */
            .zoom-badge {
                font-size: 10px;
                padding: 2px 7px;

            }

            /* Context menu — wider, bigger tap targets */
            #ctx-menu {

                border-radius: 14px;
            }

            .ctx-item {
                font-size: 15px;
                padding: 13px 16px;

            }

            .ctx-item svg {
                width: 16px;
                height: 16px;
            }

            /* Swap bar */
            #swap-bar {
                font-size: 13px;
                padding: 8px 14px;
                border-radius: 10px;
            }

            #cancel-swap {
                font-size: 12px;
                padding: 5px 12px;
            }

            /* Hint text */
            .hint {
                font-size: 12px;
                margin-top: 0.6rem;
            }

            /* Zoom modal — near fullscreen on mobile */
            #zoom-box {
                width: 96vw;
                padding: 14px;
                gap: 10px;
                border-radius: 18px;
            }

            #zoom-box h3 {
                font-size: 15px;
            }

            #zoom-hint {
                font-size: 12px;
            }

            .zoom-ctrl-row label {
                font-size: 13px;
                min-width: 44px;
            }

            #zoom-val-lbl {
                font-size: 13px;
                min-width: 38px;
            }

            #zoom-reset {
                font-size: 12px;
                padding: 6px 12px;
                min-height: 34px;
            }

            #zoom-cancel-btn,
            #zoom-apply-btn {
                font-size: 14px;
                padding: 9px 20px;
                border-radius: 10px;
                min-height: 40px;
            }
        }

        /* ── Safe area for iPhone notch / home indicator ───── */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

                    el.style.cursor = "grab";
                }

                el.addEventListener("mousedown", (e) => {
                    const idx = parseInt(el.dataset.idx);
                    if (!cells[idx]?.img || (cells[idx].zoom || 1) <= 1) return;
                    if (swapSource !== null) return;
                    e.stopPropagation();
                    e.preventDefault();
                    startCellPan(e.clientX, e.clientY, idx, el, r);
                });

                el.addEventListener("touchstart", (e) => {
                    const idx = parseInt(el.dataset.idx);
                    if (!cells[idx]?.img || (cells[idx].zoom || 1) <= 1) return;
                    if (swapSource !== null) return;
                    if (e.touches.length === 1) {
                        startCellPan(e.touches[0].clientX, e.touches[0].clientY, idx, el, r);
                    }
                }, { passive: true });

                el.addEventListener("click", (e) => {
                    if (panDrag.moved) return; // was a drag, not a click
                    e.stopPropagation();
                    const idx = parseInt(el.dataset.idx);
                    if (swapSource !== null) {
                        if (swapSource !== idx) {
                            const t = cells[swapSource].img;
                            cells[swapSource].img = cells[idx].img;
                            cells[idx].img = t;
                        }
                        cancelSwap();
                        return;
                    }
                    if (cells[idx]?.img) openCtx(e, idx);
                    else {
                        ctxTarget = idx;
                        fileInput.removeAttribute("multiple");
                        fileInput.click();
                    }
                });
                el.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    el.classList.add("drag-over");
                });
                el.addEventListener("dragleave", () =>
                    el.classList.remove("drag-over"),
                );
                el.addEventListener("drop", (e) => {
                    e.preventDefault();
                    el.classList.remove("drag-over");
                    const f = e.dataTransfer.files[0];
                    if (f && f.type.startsWith("image/"))
                        loadImg(parseInt(el.dataset.idx), f);
                });
                wrap.appendChild(el);
            });
            const filled = cells.filter((c) => c.img).length;
            countBadge.textContent = `${filled}/${cells.length} foto`;
        }

        // ─── CONTEXT MENU ────────────────────────────────────────
        function openCtx(e, idx) {
            ctxTarget = idx;
            ctxMenu.classList.add("show");
            ctxMenu.style.left =
                Math.min(e.clientX, window.innerWidth - 170) + "px";
            ctxMenu.style.top =
                Math.min(e.clientY, window.innerHeight - 115) + "px";
        }
        function closeCtx() {
            ctxMenu.classList.remove("show");
            ctxTarget = null;
        }
        document.getElementById("ctx-replace").addEventListener("click", () => {
            const i = ctxTarget;
            closeCtx();
            if (i === null) return;
            ctxTarget = i;
            fileInput.removeAttribute("multiple");
            fileInput.click();
        });
        document.getElementById("ctx-move").addEventListener("click", () => {
            const i = ctxTarget;
            closeCtx();
            if (i === null) return;
            swapSource = i;
            swapBar.classList.add("show");
            render();
        });
        document.getElementById("ctx-delete").addEventListener("click", () => {
            const i = ctxTarget;
            closeCtx();
            if (i === null) return;
            cells[i].img = null;
            render();
        });

        // ── ZOOM MODAL ────────────────────────────────────────
        const zoomModal = document.getElementById("zoom-modal");
        const zoomPreview = document.getElementById("zoom-preview");
        const zoomImg = document.getElementById("zoom-img");
        const zoomSlider = document.getElementById("zoom-slider");
        const zoomValLbl = document.getElementById("zoom-val-lbl");
        let zmIdx = null, zmZoom = 1, zmPanX = 0, zmPanY = 0;
        let zmCellW = 1, zmCellH = 1;

        function applyZoomPreview() {
            zoomImg.style.transform = cellTransform(zmZoom, zmPanX, zmPanY);
            zoomSlider.value = Math.round(zmZoom * 100);
            zoomValLbl.textContent = zmZoom.toFixed(2).replace(/\.?0+$/, '') + "×";
        }

        function openZoomModal(idx) {
            zmIdx = idx;
            zmZoom = cells[idx].zoom || 1;
            zmPanX = cells[idx].panX || 0;
            zmPanY = cells[idx].panY || 0;
            zoomImg.src = cells[idx].img;
            // set preview aspect ratio from current cell rect
            const { w, h } = getSize();
            const rects = LAYOUTS[layout](w, h, gap);
            const r = rects[idx] || { w: 1, h: 1 };
            zmCellW = r.w; zmCellH = r.h;
            zoomPreview.style.paddingBottom = (r.h / r.w * 100).toFixed(2) + "%";
            zoomPreview.style.height = "0";
            zoomImg.style.position = "absolute";
            zoomImg.style.inset = "0";
            zoomImg.style.width = "100%";
            zoomImg.style.height = "100%";
            applyZoomPreview();
            zoomModal.classList.add("show");
        }

        document.getElementById("ctx-zoom").addEventListener("click", () => {
            const i = ctxTarget;
            closeCtx();
            if (i === null || !cells[i]?.img) return;
            openZoomModal(i);
        });

        document.getElementById("zoom-apply-btn").addEventListener("click", () => {
            if (zmIdx !== null) {
                cells[zmIdx].zoom = zmZoom;
                cells[zmIdx].panX = zmPanX;
                cells[zmIdx].panY = zmPanY;
            }
            zoomModal.classList.remove("show");
            render();
        });
        document.getElementById("zoom-cancel-btn").addEventListener("click", () => {
            zoomModal.classList.remove("show");
        });
        document.getElementById("zoom-backdrop").addEventListener("click", () => {
            zoomModal.classList.remove("show");
        });
        document.getElementById("zoom-reset").addEventListener("click", () => {
            zmZoom = 1; zmPanX = 0; zmPanY = 0;
            applyZoomPreview();
        });

        // Zoom slider
        zoomSlider.addEventListener("input", () => {
            zmZoom = parseInt(zoomSlider.value) / 100;
            // re-clamp pan for new zoom
            zmPanX = clampPan(zmPanX);
            zmPanY = clampPan(zmPanY);
            applyZoomPreview();
        });

        // Mouse wheel zoom in preview
        document.getElementById("zoom-preview-wrap").addEventListener("wheel", (e) => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.08 : -0.08;
            zmZoom = Math.max(1, Math.min(4, zmZoom + delta));
            zmPanX = clampPan(zmPanX);
            zmPanY = clampPan(zmPanY);
            applyZoomPreview();
        }, { passive: false });

        // Mouse drag pan
        (function () {
            let dragging = false, startX, startY, startPanX, startPanY;
            const pw = document.getElementById("zoom-preview-wrap");
            pw.addEventListener("mousedown", (e) => {
                e.preventDefault();
                dragging = true;
                startX = e.clientX; startY = e.clientY;
                startPanX = zmPanX; startPanY = zmPanY;
            });
            window.addEventListener("mousemove", (e) => {
                if (!dragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                const preW = pw.clientWidth;
                const preH = preW * zmCellH / zmCellW;
                const maxShiftX = preW * (zmZoom - 1) / 2;
                const maxShiftY = preH * (zmZoom - 1) / 2;
                if (maxShiftX > 0) zmPanX = clampPan(startPanX + dx / maxShiftX);
                if (maxShiftY > 0) zmPanY = clampPan(startPanY + dy / maxShiftY);
                applyZoomPreview();
            });
            window.addEventListener("mouseup", () => { dragging = false; });

            // Touch pan + pinch
            let lastDist = null, lastTX = null, lastTY = null;
            pw.addEventListener("touchstart", (e) => {
                if (e.touches.length === 1) {
                    lastTX = e.touches[0].clientX;
                    lastTY = e.touches[0].clientY;
                    startPanX = zmPanX; startPanY = zmPanY;
                    lastDist = null;
                } else if (e.touches.length === 2) {
                    lastDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    lastTX = null;
                }
            }, { passive: true });
            pw.addEventListener("touchmove", (e) => {
                e.preventDefault();
                const preW = pw.clientWidth;
                const preH = preW * zmCellH / zmCellW;
                if (e.touches.length === 2 && lastDist !== null) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const scale = dist / lastDist;
                    zmZoom = Math.max(1, Math.min(4, zmZoom * scale));
                    zmPanX = clampPan(zmPanX);
                    zmPanY = clampPan(zmPanY);
                    lastDist = dist;
                    applyZoomPreview();
                } else if (e.touches.length === 1 && lastTX !== null) {
                    const dx = e.touches[0].clientX - lastTX;
                    const dy = e.touches[0].clientY - lastTY;
                    lastTX = e.touches[0].clientX;
                    lastTY = e.touches[0].clientY;
                    const maxShiftX = preW * (zmZoom - 1) / 2;
                    const maxShiftY = preH * (zmZoom - 1) / 2;
                    if (maxShiftX > 0) zmPanX = clampPan(zmPanX + dx / maxShiftX);
                    if (maxShiftY > 0) zmPanY = clampPan(zmPanY + dy / maxShiftY);
                    applyZoomPreview();
                }
            }, { passive: false });
            pw.addEventListener("touchend", () => { lastDist = null; lastTX = null; });
        })();
        document.addEventListener("click", (e) => {
            if (!ctxMenu.contains(e.target)) closeCtx();
        });

        function cancelSwap() {
            swapSource = null;
            swapBar.classList.remove("show");
            render();
        }
        document
            .getElementById("cancel-swap")
            .addEventListener("click", cancelSwap);

        // ─── FILE UPLOAD ─────────────────────────────────────────
        function loadImg(idx, file) {
            const r = new FileReader();
            r.onload = (e) => {
                cells[idx].img = e.target.result;
                cells[idx].zoom = 1;
                cells[idx].panX = 0;
                cells[idx].panY = 0;
                ctxTarget = null;
                render();
            };
            r.readAsDataURL(file);
        }

        fileInput.addEventListener("change", (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            if (ctxTarget !== null && files.length === 1) {
                loadImg(ctxTarget, files[0]);
            } else {
                const filled = cells.filter((c) => c.img).length,
                    total = filled + files.length;
                const best = pickAuto(total);
                if (best !== layout) {
                    layout = best;
                    document
                        .querySelectorAll(".lt-wrap")
                        .forEach((el) =>
                            el.classList.toggle("active", el.dataset.key === layout),
                        );
                    const { w, h } = getSize(),
                        n = LAYOUTS[layout](w, h, gap).length;
                    while (cells.length < n) cells.push({ img: null });
                    cells = cells.slice(0, n);
                }
                let next = cells.findIndex((c) => !c.img);
                files.forEach((f) => {
                    if (next >= 0 && next < cells.length) {
                        loadImg(next, f);
                        next++;
                        while (next < cells.length && cells[next]?.img) next++;
                    }
                });
            }
            fileInput.value = "";
        });

        // ─── CONTROLS ────────────────────────────────────────────
        document.getElementById("add-btn").addEventListener("click", () => {
            ctxTarget = null;
            fileInput.setAttribute("multiple", "");
            fileInput.click();
        });
        document.getElementById("clear-btn").addEventListener("click", () => {
            if (!confirm("Hapus semua foto?")) return;
            cells.forEach((c) => (c.img = null));
            cancelSwap();
        });
        gapRange.addEventListener("input", () => {
            gap = parseInt(gapRange.value);
            gapVal.textContent = gap + "px";
            render();
        });
        radiusRange.addEventListener("input", () => {
            radius = parseInt(radiusRange.value);
            radiusVal.textContent = radius + "px";
            render();
        });
        bgInput.addEventListener("input", () => {
            bgColor = bgInput.value;
            render();
        });

        // ─── DOWNLOAD ────────────────────────────────────────────
        document.getElementById("download-btn").addEventListener("click", () => {
            const { w, h } = getSize(),
                sc = 2,
                rects = LAYOUTS[layout](w, h, gap);
            const cv = document.createElement("canvas");
            cv.width = w * sc;
            cv.height = h * sc;
            const ctx = cv.getContext("2d");
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, cv.width, cv.height);
            let pending = 0;
            const done = () => {
                if (--pending <= 0) {
                    const a = document.createElement("a");
                    a.download = "kolase.png";
                    a.href = cv.toDataURL("image/png");
                    a.click();
                }
            };
            rects.forEach((r, i) => {
                if (!cells[i]?.img) return;
                pending++;
                const img = new Image();
                img.onload = () => {
                    ctx.save();
                    const rx = r.x * sc, ry = r.y * sc, rw = r.w * sc, rh = r.h * sc;
                    const ra = radius * sc;
                    if (radius > 0) {
                        ctx.beginPath();
                        ctx.moveTo(rx + ra, ry);
                        ctx.lineTo(rx + rw - ra, ry);
                        ctx.arcTo(rx + rw, ry, rx + rw, ry + ra, ra);
                        ctx.lineTo(rx + rw, ry + rh - ra);
                        ctx.arcTo(rx + rw, ry + rh, rx + rw - ra, ry + rh, ra);
                        ctx.lineTo(rx + ra, ry + rh);
                        ctx.arcTo(rx, ry + rh, rx, ry + rh - ra, ra);
                        ctx.lineTo(rx, ry + ra);
                        ctx.arcTo(rx, ry, rx + ra, ry, ra);
                        ctx.closePath();
                        ctx.clip();
                    } else {
                        ctx.beginPath();
                        ctx.rect(rx, ry, rw, rh);
                        ctx.clip();
                    }
                    // Compute cover fit
                    const iR = img.naturalWidth / img.naturalHeight;
                    const cR = r.w / r.h;
                    let sw, sh, sx, sy;
                    if (iR > cR) { sh = img.naturalHeight; sw = sh * cR; sx = (img.naturalWidth - sw) / 2; sy = 0; }
                    else { sw = img.naturalWidth; sh = sw / cR; sx = 0; sy = (img.naturalHeight - sh) / 2; }
                    // Apply zoom & pan
                    const zm = cells[i].zoom || 1;
                    const px = cells[i].panX || 0;
                    const py = cells[i].panY || 0;
                    // Pan shifts in canvas cell coords: visual shift = panX * (zm-1)/2 * rw
                    const shiftX = px * (zm - 1) / 2 * rw;
                    const shiftY = py * (zm - 1) / 2 * rh;
                    // Zoom shrinks source crop
                    const zsw = sw / zm, zsh = sh / zm;
                    const zsx = sx + (sw - zsw) / 2 - shiftX * (sw / zm) / (rw / sc);
                    const zsy = sy + (sh - zsh) / 2 - shiftY * (sh / zm) / (rh / sc);
                    ctx.drawImage(img, zsx, zsy, zsw, zsh, rx, ry, rw, rh);
                    ctx.restore();
                    done();
                };
                img.src = cells[i].img;
            });
            if (pending === 0) {
                const a = document.createElement("a");
                a.download = "kolase.png";
                a.href = cv.toDataURL("image/png");
                a.click();
            }
        });

        // Toggle layout picker visibility
        const toggleBtn = document.getElementById("toggle-layouts");
        toggleBtn.addEventListener("click", () => {
            pickerRow.classList.toggle("show");
            toggleBtn.classList.toggle("active");
        });

        // Toggle rasio panel visibility
        const toggleRasioBtn = document.getElementById("toggle-rasio");
        const rasioPanel = document.getElementById("rasio-panel");
        toggleRasioBtn.addEventListener("click", () => {
            rasioPanel.classList.toggle("show");
            toggleRasioBtn.classList.toggle("active");
        });

        window.addEventListener("resize", render);
        buildPicker();
        buildRatioPicker();
        render();
    </script>
</body>

</html>
